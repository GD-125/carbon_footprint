# ── Ruff Configuration ──────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in defaults (FastAPI Depends pattern)
    "N805",   # first argument of a method should be named 'self' (Pydantic validators)
]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

# ── Black Configuration ─────────────────────────────────────────────────────────
[tool.black]
line-length = 100
target-version = ["py312"]

# ── Pytest Configuration ────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml:coverage.xml",
    "--cov-fail-under=85",
    "-v",
]

# ── Coverage Configuration ──────────────────────────────────────────────────────
[tool.coverage.run]
source = ["app"]
omit = [
    "app/__init__.py",
    "app/*/__init__.py",
    "tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
